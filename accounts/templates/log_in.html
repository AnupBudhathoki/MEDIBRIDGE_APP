{% extends "base.html" %}
{% block content %}
<div class="min-vh-100 d-flex align-items-center justify-content-center py-5"
     style="background: linear-gradient(135deg, #e8f5e9, #e3f2fd);">
    <div class="card shadow" style="max-width:420px; width:100%; border-radius:15px; overflow:hidden;">
        <div class="text-white text-center p-4" style="background: linear-gradient(to right, #198754, #0d6efd);">
            <h3 class="mb-0"><i class="fas fa-sign-in-alt me-2"></i>Welcome Back</h3>
            <p class="mb-0 opacity-75">Login to your account</p>
        </div>
        <div class="card-body p-4 bg-white">
            {% if error %}
            <div class="alert alert-danger">{{ error }}</div>
            {% endif %}
            <form method="post">
                {% csrf_token %}
                <div class="mb-3">
                    <label class="form-label fw-semibold">Email Address</label>
                    <input type="email" name="email" class="form-control" placeholder="example@email.com" required autofocus>
                </div>
                <div class="mb-4">
                    <label class="form-label fw-semibold">Password</label>
                    <input type="password" name="password" class="form-control" placeholder="Enter password" required>
                </div>
                <div class="d-grid">
                    <button type="submit" class="btn btn-success btn-lg">Login</button>
                </div>
            </form>
        </div>
        <div class="card-footer text-center bg-light">
            <small>Don't have an account?
                <a href="{% url 'register' %}" class="text-primary fw-semibold">Register</a>
            </small>
        </div>
    </div>
</div>
{% endblock %}
